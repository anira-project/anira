name: clang_format

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-24.04
    steps:
      # submodules: true is required because .clang-format is a symlink into
      # modules/tanh-lib; without it the symlink dangles and clang-format
      # silently falls back to the default LLVM style.
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: tanh-lab/ci-actions/setup-cpp-build-tools@main
      - uses: tanh-lab/ci-actions/clang-format-check@main
        with:
          SOURCES: "src/ include/ test/ examples/"
