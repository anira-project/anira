name: build_examples

on:
  workflow_call:
  workflow_dispatch: # lets you run a build from github.com
  # Runs the workflow on all push events
  pull_request:
    branches:
      - main

env:
  SCCACHE_GHA_ENABLED: "true"

# When pushing new commits, cancel any workflows with the same name on that branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false # show all errors for each platform (vs. cancel jobs on error)
      matrix:
        include:
          # Each platform builds the examples both shared and static as its own runner.
          - name: Linux-x86_64-shared
            os: ubuntu-latest
            shared: ON
          - name: Linux-x86_64-static
            os: ubuntu-latest
            shared: OFF
          - name: macOS-x86_64-shared
            os: macOS-latest
            shared: ON
          - name: macOS-x86_64-static
            os: macOS-latest
            shared: OFF
          - name: macOS-arm64-shared
            os: macOS-latest
            shared: ON
          - name: macOS-arm64-static
            os: macOS-latest
            shared: OFF
          - name: Windows-x86_64-shared
            os: windows-latest
            shared: ON
          - name: Windows-x86_64-static
            os: windows-latest
            shared: OFF

    runs-on: ${{ matrix.os }}
    steps:
      - name: get repo and submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: setup
        uses: ./.github/actions/setup
      - name: add juce deps
        shell: bash
        run: |
          if [[ "${{ matrix.name }}" == Linux-* ]]; then
            sudo apt install libxrandr-dev libxinerama-dev libxcursor-dev libfreetype6-dev libasound2-dev libfontconfig1-dev libjack-jackd2-dev
            # Fix the juce bug with ft2build.h not found
            sudo ln -s /usr/include/freetype2/ft2build.h /usr/include/ft2build.h
            sudo ln -s /usr/include/freetype2/freetype /usr/include/freetype
          fi
      - name: build
        uses: ./.github/actions/build
        with:
          BUILD_TYPE: Release
          CMAKE_BUILD_PARALLEL_LEVEL: 4
          # Build all enabled example targets. The exact set depends on which backends are
          # active (libtorch is auto-disabled for static builds, TFLite is legacy/off), so we
          # let CMake build everything rather than naming targets that may not exist per leg.
          CMAKE_BUILD_ARGS: "-DBUILD_SHARED_LIBS=${{ matrix.shared }} -DANIRA_WITH_EXAMPLES=ON"
