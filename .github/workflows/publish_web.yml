name: publish_web

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-web
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: derive version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse --short HEAD)
          if tag=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            version="${tag#v}"
          elif desc=$(git describe --tags --long --match 'v*.*.*' 2>/dev/null); then
            base_and_n="${desc%-g*}"
            base="${base_and_n%-*}"
            base="${base#v}"
            n="${base_and_n##*-}"
            version="${base}-rc.${n}.${sha}"
          else
            version="0.0.0-rc.0.${sha}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Derived version: ${version}"

      - name: install system deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.23
          actions-cache-folder: emsdk-cache-4.0.23

      - name: verify EMSDK env
        run: |
          echo "EMSDK=$EMSDK"
          test -n "$EMSDK"
          emcc --version

      - name: pin global typescript for emscripten --emit-tsd
        run: |
          sudo npm i -g typescript@5.9
          which tsc
          tsc --version

      - name: configure wasm
        run: cmake --preset wasm-release

      - name: build wasm
        run: cmake --build --preset wasm-release -j

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: install js deps
        working-directory: web
        run: npm ci

      - name: set package version
        working-directory: web
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: build js package
        working-directory: web
        run: npm run build

      - name: npm pack
        id: pack
        working-directory: web
        run: |
          tarball=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anira-web-${{ steps.version.outputs.version }}
          path: web/${{ steps.pack.outputs.tarball }}
          retention-days: 30

      - name: summary
        shell: bash
        run: |
          {
            echo "### anira-web packed"
            echo ""
            echo "- **Version:** \`${{ steps.version.outputs.version }}\`"
            echo "- **Artifact:** \`anira-web-${{ steps.version.outputs.version }}\` (tarball: \`${{ steps.pack.outputs.tarball }}\`)"
            echo "- Promote with the \`publish_web_from_run\` workflow using run ID \`${{ github.run_id }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
