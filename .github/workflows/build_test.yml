name: build_test

on:
  workflow_call:
  workflow_dispatch: # lets you run a build from github.com
  # Runs the workflow on all push events
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  SCCACHE_GHA_ENABLED: "true"

# When pushing new commits, cancel any workflows with the same name on that branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false # show all errors for each platform (vs. cancel jobs on error)
      matrix:
        include:
          # Every platform/arch is built both shared and static as its own runner.
          # `inference_engines` toggles LibTorch + ONNX Runtime + LiteRT together;
          # LibTorch is shared-only, so anira's CMake auto-disables it for static builds.
          # Per-leg `onnxruntime` / `litert` / `tflite` overrides cover the legacy TFLite
          # backend (mutually exclusive with LiteRT) — see the *-tflite-* legs below.
          - name: Linux-x86_64-no_inference_engines
            os: ubuntu-latest
            inference_engines: OFF
            shared: ON
          - name: Linux-x86_64-shared
            os: ubuntu-latest
            inference_engines: ON
            shared: ON
          - name: Linux-x86_64-static
            os: ubuntu-latest
            inference_engines: ON
            shared: OFF
          - name: Linux-arm64-shared
            os: ubuntu-24.04-arm
            inference_engines: ON
            shared: ON
          - name: Linux-arm64-static
            os: ubuntu-24.04-arm
            inference_engines: ON
            shared: OFF
          - name: Windows-x86_64-shared
            os: windows-latest
            inference_engines: ON
            shared: ON
          - name: Windows-x86_64-static
            os: windows-latest
            inference_engines: ON
            shared: OFF
          - name: Windows-arm64-shared
            os: windows-11-arm
            inference_engines: ON
            shared: ON
          - name: Windows-arm64-static
            os: windows-11-arm
            inference_engines: ON
            shared: OFF
          - name: macOS-x86_64-shared
            os: macOS-latest
            inference_engines: ON
            shared: ON
          - name: macOS-x86_64-static
            os: macOS-latest
            inference_engines: ON
            shared: OFF
          - name: macOS-arm64-shared
            os: macOS-latest
            inference_engines: ON
            shared: ON
          - name: macOS-arm64-static
            os: macOS-latest
            inference_engines: ON
            shared: OFF
          - name: macOS-universal-shared
            os: macOS-latest
            inference_engines: ON
            shared: ON
          - name: macOS-universal-static
            os: macOS-latest
            inference_engines: ON
            shared: OFF
          # Legacy TFLite backend (ONNX + TFLite; LiteRT/LibTorch off since TFLite is
          # mutually exclusive with LiteRT). One x86_64 leg per desktop OS, shared+static.
          - name: Linux-x86_64-tflite-shared
            os: ubuntu-latest
            inference_engines: OFF
            onnxruntime: ON
            tflite: ON
            shared: ON
          - name: Linux-x86_64-tflite-static
            os: ubuntu-latest
            inference_engines: OFF
            onnxruntime: ON
            tflite: ON
            shared: OFF
          - name: macOS-arm64-tflite-shared
            os: macOS-latest
            inference_engines: OFF
            onnxruntime: ON
            tflite: ON
            shared: ON
          - name: macOS-arm64-tflite-static
            os: macOS-latest
            inference_engines: OFF
            onnxruntime: ON
            tflite: ON
            shared: OFF
          - name: Windows-x86_64-tflite-shared
            os: windows-latest
            inference_engines: OFF
            onnxruntime: ON
            tflite: ON
            shared: ON
          - name: Windows-x86_64-tflite-static
            os: windows-latest
            inference_engines: OFF
            onnxruntime: ON
            tflite: ON
            shared: OFF

    runs-on: ${{ matrix.os }}
    steps:
      - name: get repo and submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: setup
        uses: ./.github/actions/setup
      - name: build
        uses: ./.github/actions/build
        with:
          BUILD_TYPE: Release
          CMAKE_BUILD_PARALLEL_LEVEL: 4
          # Backends resolve per-leg: explicit matrix override first, else the shared
          # `inference_engines` toggle, else OFF (TFLite defaults OFF — legacy, opt-in).
          CMAKE_BUILD_ARGS: "-DBUILD_SHARED_LIBS=${{ matrix.shared }} -DANIRA_WITH_TESTS=ON -DANIRA_WITH_LIBTORCH=${{ matrix.inference_engines }} -DANIRA_WITH_ONNXRUNTIME=${{ matrix.onnxruntime || matrix.inference_engines }} -DANIRA_WITH_LITERT=${{ matrix.litert || matrix.inference_engines }} -DANIRA_WITH_TFLITE=${{ matrix.tflite || 'OFF' }}"
      - name: test
        uses: ./.github/actions/test
