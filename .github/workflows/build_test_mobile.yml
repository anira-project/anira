name: build_test_mobile

# Mobile build + test. The desktop matrix lives in build_test.yml; mobile is split
# out because it cross-compiles and runs the suite on a simulator/emulator rather
# than natively. The whole gtest binary is launched once per target (see the single
# CTest entry registered for Android/iOS in test/CMakeLists.txt) instead of one
# launch per case, so a run is one simctl/adb invocation.
#
# Backend coverage (LibTorch has no mobile build, so it is never enabled here):
#   - ONNX Runtime + LiteRT (the default pairing)
#   - TFLite (legacy) on its own — it is mutually exclusive with LiteRT, and on iOS
#     it also collides with ONNX, so it is built alone
#   - no backend (core only)
# Android additionally covers both shared and static linkage (iOS is static-only:
# the backend xcframeworks ship static).

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  SCCACHE_GHA_ENABLED: "true"

# Hardcode the workflow name (not ${{ github.workflow }}): when on_tag.yml calls this
# as a reusable workflow, github.workflow becomes "on_tag" — shared with build_test,
# so cancel-in-progress would cancel one of them. A literal keeps the group distinct
# in both the standalone (PR/push) and reused (tag) cases.
concurrency:
  group: build_test_mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # iOS: per backend set, build the device library (wiring check) and the simulator
  # test executable, then run the whole suite once on the simulator.
  # ---------------------------------------------------------------------------
  ios:
    name: iOS-${{ matrix.name }}
    runs-on: macos-latest # Apple Silicon -> arm64 device + arm64 simulator slices
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: onnx-litert
            backends: "-DANIRA_WITH_ONNXRUNTIME=ON -DANIRA_WITH_LITERT=ON -DANIRA_WITH_TFLITE=OFF"
          - name: tflite
            backends: "-DANIRA_WITH_ONNXRUNTIME=OFF -DANIRA_WITH_LITERT=OFF -DANIRA_WITH_TFLITE=ON"
          - name: no-backend
            backends: "-DANIRA_WITH_ONNXRUNTIME=OFF -DANIRA_WITH_LITERT=OFF -DANIRA_WITH_TFLITE=OFF"
    env:
      GITHUB_TOKEN: ${{ github.token }} # lets anira's backend integrity check avoid API rate limits
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: install deps
        run: brew install ninja

      - name: cache the build
        uses: mozilla-actions/sccache-action@v0.0.8

      # Device (arm64) — library only: verifies the backend wiring compiles for
      # iphoneos. No executable is linked, so it is build-coverage, not a run.
      - name: build device library
        run: |
          cmake -B build-ios-device -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DBUILD_SHARED_LIBS=OFF -DANIRA_WITH_LIBTORCH=OFF ${{ matrix.backends }}
          cmake --build build-ios-device --parallel 4

      # Simulator — full test executable, then run the whole bundled suite once.
      - name: build simulator tests
        run: |
          cmake -B build-ios-sim -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphonesimulator -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DBUILD_SHARED_LIBS=OFF -DANIRA_WITH_LIBTORCH=OFF ${{ matrix.backends }} \
            -DANIRA_WITH_TESTS=ON
          cmake --build build-ios-sim --parallel 4

      - name: run tests on the simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone" \
                 | grep -oE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" | head -1)
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          # The simulator shares the host filesystem, so the model paths baked into
          # the binary resolve as-is — one spawn runs the whole bundled suite.
          xcrun simctl spawn "$UDID" "$PWD/build-ios-sim/test/tests.app/tests" --gtest_brief=1

  # ---------------------------------------------------------------------------
  # Android: per backend set + linkage, build arm64-v8a (build-only; no accelerated
  # arm emulator on x86 CI) and x86_64, then run the x86_64 suite on a hardware-
  # accelerated emulator.
  # ---------------------------------------------------------------------------
  android:
    name: Android-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: onnx-litert-shared
            shared: ON
            backends: "-DANIRA_WITH_ONNXRUNTIME=ON -DANIRA_WITH_LITERT=ON -DANIRA_WITH_TFLITE=OFF"
          - name: onnx-litert-static
            shared: OFF
            backends: "-DANIRA_WITH_ONNXRUNTIME=ON -DANIRA_WITH_LITERT=ON -DANIRA_WITH_TFLITE=OFF"
          - name: tflite-shared
            shared: ON
            backends: "-DANIRA_WITH_ONNXRUNTIME=OFF -DANIRA_WITH_LITERT=OFF -DANIRA_WITH_TFLITE=ON"
          - name: no-backend-shared
            shared: ON
            backends: "-DANIRA_WITH_ONNXRUNTIME=OFF -DANIRA_WITH_LITERT=OFF -DANIRA_WITH_TFLITE=OFF"
    env:
      GITHUB_TOKEN: ${{ github.token }}
      ANDROID_PLATFORM: android-24
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: install deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: cache the build
        uses: mozilla-actions/sccache-action@v0.0.8

      # arm64-v8a: build the full test executable to verify it compiles + links for
      # the ABI we ship most. Not run here (no accelerated arm emulator on an x86
      # host); the x86_64 emulator below provides the actual execution coverage.
      - name: build arm64-v8a
        run: |
          cmake -B build-arm64 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=$ANDROID_PLATFORM \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} -DANIRA_WITH_LIBTORCH=OFF ${{ matrix.backends }} \
            -DANIRA_WITH_TESTS=ON
          cmake --build build-arm64 --parallel 4

      # x86_64: build with the model paths pointed at the on-device staging dir so
      # the binary + JSON configs reference where the model tree is pushed.
      - name: build x86_64
        run: |
          cmake -B build-x86_64 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 -DANDROID_PLATFORM=$ANDROID_PLATFORM \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} -DANIRA_WITH_LIBTORCH=OFF ${{ matrix.backends }} \
            -DANIRA_WITH_TESTS=ON \
            -DANIRA_EXTRAS_MODELS_DIR=/data/local/tmp/anira/models
          cmake --build build-x86_64 --parallel 4

      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: run x86_64 suite on the emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          # android-emulator-runner runs each line of an inline script in its own
          # shell, so the staging + run logic lives in one committed script where the
          # variables persist.
          script: bash .github/scripts/android_emulator_test.sh
