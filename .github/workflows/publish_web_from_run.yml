name: publish_web_from_run

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the publish_web workflow that produced the RC artifact'
        required: true
      dist_tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'next'
        type: choice
        options:
          - next
          - latest
          - rc

concurrency:
  group: publish-web
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: download rc artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: anira-web-*
          path: ./artifact
          merge-multiple: true

      - name: locate tarball
        id: tarball
        shell: bash
        run: |
          set -euo pipefail
          tgz=$(ls ./artifact/anira-web-*.tgz | head -n 1)
          if [ -z "${tgz}" ]; then
            echo "No anira-web-*.tgz found in artifact" >&2
            exit 1
          fi
          echo "path=${tgz}" >> "$GITHUB_OUTPUT"
          echo "Found tarball: ${tgz}"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ steps.tarball.outputs.path }}" --access public --tag "${{ inputs.dist_tag }}"

      - name: summary
        shell: bash
        run: |
          {
            echo "### anira-web promoted"
            echo ""
            echo "- **Source run:** \`${{ inputs.run_id }}\`"
            echo "- **Tarball:** \`${{ steps.tarball.outputs.path }}\`"
            echo "- **dist-tag:** \`${{ inputs.dist_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
