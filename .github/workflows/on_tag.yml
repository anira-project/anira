name: on_tag

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build_test:
    uses: ./.github/workflows/build_test.yml
    secrets: inherit
  # Gate releases on the mobile suites too: a tag now runs the iOS simulator and
  # Android emulator test runs before any artifact is published.
  build_test_mobile:
    uses: ./.github/workflows/build_test_mobile.yml
    secrets: inherit
  build_release:
    needs: [build_test, build_test_mobile]
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false # show all errors for each platform (vs. cancel jobs on error)
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-latest
          - name: macOS-x86_64
            os: macOS-latest
          - name: macOS-arm64
            os: macOS-latest
          - name: Windows-x86_64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: get repo and submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: setup
        uses: ./.github/actions/setup
      - name: build
        uses: ./.github/actions/build
        with:
          BUILD_TYPE: Release
          CMAKE_BUILD_PARALLEL_LEVEL: 4
          CMAKE_BUILD_ARGS: "-DBUILD_SHARED_LIBS=ON -DANIRA_WITH_INSTALL=ON"
      - name: install
        id: install
        uses: ./.github/actions/install
        with:
          BUILD_TYPE: Release
          PROJECT_NAME: anira
          DEV_ID_APP_CERT: ${{ secrets.DEV_ID_APP_CERT }}
          DEV_ID_APP_PWD: ${{ secrets.DEV_ID_APP_PWD }}
          DEV_ID_APP: ${{ secrets.DEV_ID_APP }}

  # iOS ships as a code-signed xcframework rather than the find_package install tree
  # (an .xcframework links from both CMake and Xcode). anira links the backends in
  # statically, so the consumer also needs their iOS xcframeworks — they are bundled
  # alongside. The zip is published with the other release assets via the */*.zip glob.
  build_release_ios:
    needs: [build_test, build_test_mobile]
    name: iOS-xcframework
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ github.token }} # lets anira's backend integrity check avoid API rate limits
    steps:
      - name: get repo and submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: install deps
        run: brew install ninja
      - name: import certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEV_ID_APP_CERT }}
          p12-password: ${{ secrets.DEV_ID_APP_PWD }}
      - name: build + sign anira.xcframework
        id: xcf
        run: |
          VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          PRODUCT="anira-${VERSION}-iOS-xcframework"
          OUT="artefacts/${PRODUCT}"
          ANIRA_CODESIGN_IDENTITY="${{ secrets.DEV_ID_APP }}" \
            bash .github/scripts/build_ios_xcframework.sh "$OUT"
          # Bundle the backend iOS xcframeworks anira's static build links against.
          find modules -type d -path '*iOS-xcframework/*.xcframework' -prune -exec cp -R {} "$OUT/" \;
          (cd artefacts && zip -vr "${PRODUCT}.zip" "${PRODUCT}/" -x "*.DS_Store")
          echo "PRODUCT=${PRODUCT}" >> "$GITHUB_OUTPUT"
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.xcf.outputs.PRODUCT }}.zip
          path: artefacts/${{ steps.xcf.outputs.PRODUCT }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build_release
      - build_release_ios
    steps:
    - name: Get Artifacts
      uses: actions/download-artifact@v4
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          */*.zip
      
