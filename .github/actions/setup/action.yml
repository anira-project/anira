name: setup
description: "Setup the project and install dependencies"

runs:
  using: "composite"
  steps:
      #A simple printout of the matrix
      - name: printout
        shell: bash
        run: |
          echo ${{ github.ref }}
          echo "matrix.name=${{ matrix.name }}";
          echo "matrix.os=${{ matrix.os }}";
          if [ "${{ matrix.name }}" == "Linux-x86_64" ]; then
            echo "$(uname -a)"
          elif [ "${{ matrix.os }}" == "macOS-latest" ]; then
            echo "$(uname -a)"
          fi;

      # We need the osxutils to get the codesign and notorization tools
      - name: install deps
        shell: bash
        run: |
          case "${{ matrix.name }}" in
            Linux-*)
              sudo apt-get update && sudo apt install -y ninja-build ;;
            macOS-*)
              brew install osxutils ninja
              echo "brew prefix: $(brew --prefix)" ;;
            Windows-x86_64*)
              choco install ninja ;;
            Windows-arm64*)
              : ;;  # native MSVC (default generator) build; ninja not required
            *)
              echo "Unknown OS" ;;
          esac